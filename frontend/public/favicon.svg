<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <linearGradient id="paint-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" />    <stop offset="50%" stop-color="#8b5cf6" />   <stop offset="100%" stop-color="#ec4899" />  </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>
  
  <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#bg)" filter="url(#shadow)" />

  <path d="M 60,200 C -10,130 50,40 140,50 C 230,60 250,150 180,210 C 120,260 100,240 60,200 Z" fill="url(#paint-gradient)" filter="url(#glow)" opacity="0.95" />

  <circle cx="180" cy="70" r="10" fill="#ffffff" opacity="0.9" />
  <circle cx="210" cy="110" r="6" fill="#ffffff" opacity="0.7" />
  <circle cx="65" cy="150" r="8" fill="#ffffff" opacity="0.8" />
  <circle cx="95" cy="65" r="5" fill="#ffffff" opacity="0.6" />

  <g transform="translate(68, 68) scale(5)" filter="url(#shadow)">
    <path d="m9.06 11.9 8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08" stroke="#ffffff" stroke-width="1.8" fill="#0f172a" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z" stroke="#ffffff" stroke-width="1.8" fill="url(#paint-gradient)" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>